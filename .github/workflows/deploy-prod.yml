name: Deploy Production — Identity Service

on:
  push:
    branches: [main]
    paths:
      - "services/identity/**"
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production release"
        required: true

jobs:
  gate-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'DEPLOY' }}
        run: |
          echo "Confirmation not provided. Aborting."
          exit 1

  build-and-deploy:
    needs: [gate-check]
    if: always() && (needs.gate-check.result == 'success' || github.event_name == 'push')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          az acr login --name edaiacrprod
          docker build \
            -t edaiacrprod.azurecr.io/identity:${{ github.sha }} \
            -t edaiacrprod.azurecr.io/identity:latest \
            -f services/identity/Dockerfile \
            services/identity
          docker push edaiacrprod.azurecr.io/identity:${{ github.sha }}
          docker push edaiacrprod.azurecr.io/identity:latest

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name edai-identity \
            --resource-group edai-prod-rg \
            --image edaiacrprod.azurecr.io/identity:${{ github.sha }}

      - name: Health check
        run: |
          sleep 20
          FQDN=$(az containerapp show \
            --name edai-identity \
            --resource-group edai-prod-rg \
            --query properties.configuration.ingress.fqdn -o tsv)
          curl --fail "https://${FQDN}/health" || (echo "Health check failed" && exit 1)
