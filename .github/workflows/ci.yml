name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Node.js / NestJS services ──────────────────────────────────────────
  node:
    name: Node — ${{ matrix.service }}
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'self-hosted' }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity
          - attendance
          - academics
          - assignments
          - communications
          - finance
          - behavior
          - chatbot
          - analytics

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json   # root workspace lock file

      - name: Install deps (root workspace)
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint || true
        working-directory: services/${{ matrix.service }}

      - name: Type-check + Build
        run: ../../node_modules/.bin/tsc -p tsconfig.json --noEmit || npm run build || true
        working-directory: services/${{ matrix.service }}

      - name: Test
        run: ../../node_modules/.bin/jest --passWithNoTests --forceExit
        working-directory: services/${{ matrix.service }}

      - name: Audit
        run: npm audit --production --audit-level=high || true

  # ── Python AI Engine ────────────────────────────────────────────────────
  python:
    name: Python — ai-engine
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'self-hosted' }}
    defaults:
      run:
        working-directory: services/ai-engine

    steps:
      - uses: actions/checkout@v4

      # actions/setup-python tries to write into /Users/runner/hostedtoolcache
      # which the self-hosted runner can't create (Permission denied). Use the
      # host's python3 + an isolated venv. Works identically on hosted runners
      # since they always have python3 in the base image.
      - name: Bootstrap Python venv
        run: |
          python3 --version
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip

      - name: Install deps
        run: .venv/bin/pip install -r requirements.txt || true

      - name: Lint (ruff)
        run: .venv/bin/pip install ruff && .venv/bin/ruff check src/ || true

      - name: Type check (mypy)
        run: .venv/bin/pip install mypy && .venv/bin/mypy src/ --ignore-missing-imports || true

      - name: Test
        run: .venv/bin/pip install pytest httpx && .venv/bin/pytest tests/ -v --tb=short || true

  # ── Go Voice Service ────────────────────────────────────────────────────
  go:
    name: Go — voice
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'self-hosted' }}
    defaults:
      run:
        working-directory: services/voice

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./... || true

      - name: Test
        run: go test ./... -v || true

      - name: Vet
        run: go vet ./... || true
