name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Node.js / NestJS services ──────────────────────────────────────────
  node:
    name: Node — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity
          - attendance
          - academics
          - assignments
          - communications
          - finance
          - behavior
          - chatbot
          - analytics

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: services/${{ matrix.service }}

      - name: Lint
        run: npm run lint || true
        working-directory: services/${{ matrix.service }}

      - name: Build (type-check)
        run: npm run build
        working-directory: services/${{ matrix.service }}

      - name: Test
        run: npm test -- --passWithNoTests
        working-directory: services/${{ matrix.service }}

      - name: Audit
        run: npm audit --production --audit-level=high || true
        working-directory: services/${{ matrix.service }}

  # ── Python AI Engine ────────────────────────────────────────────────────
  python:
    name: Python — ai-engine
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt
        working-directory: services/ai-engine

      - name: Lint (ruff)
        run: pip install ruff && ruff check src/ || true
        working-directory: services/ai-engine

      - name: Type check (mypy)
        run: pip install mypy && mypy src/ --ignore-missing-imports || true
        working-directory: services/ai-engine

      - name: Test
        run: pip install pytest httpx && pytest tests/ -v
        working-directory: services/ai-engine

  # ── Go Voice Service ────────────────────────────────────────────────────
  go:
    name: Go — voice
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...
        working-directory: services/voice

      - name: Test
        run: go test ./... -v
        working-directory: services/voice

      - name: Vet
        run: go vet ./...
        working-directory: services/voice
