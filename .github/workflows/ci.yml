name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Node.js / NestJS services ──────────────────────────────────────────
  node:
    name: Node — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity
          - attendance
          - academics
          - assignments
          - communications
          - finance
          - behavior
          - chatbot
          - analytics

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json   # root workspace lock file

      - name: Install deps (root workspace)
        # Force a clean install on self-hosted runners — partial caches
        # have caused intermittent "Cannot find module 'jest-util'" on
        # the identity job. Hosted runners always start clean so this is
        # a no-op there.
        run: |
          rm -rf node_modules services/${{ matrix.service }}/node_modules
          npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint || true
        working-directory: services/${{ matrix.service }}

      - name: Type-check + Build
        run: ../../node_modules/.bin/tsc -p tsconfig.json --noEmit || npm run build || true
        working-directory: services/${{ matrix.service }}

      - name: Test
        # Self-hosted runners cache node_modules across runs; jest-util can
        # go missing when the cache is partially stale. Use the workspace's
        # local jest binary so npm/pnpm resolution finds hoisted transitives.
        run: |
          if [ -x ./node_modules/.bin/jest ]; then
            ./node_modules/.bin/jest --passWithNoTests --forceExit
          else
            ../../node_modules/.bin/jest --passWithNoTests --forceExit
          fi
        working-directory: services/${{ matrix.service }}

      - name: Audit
        run: npm audit --production --audit-level=high || true

  # ── Python AI Engine ────────────────────────────────────────────────────
  python:
    name: Python — ai-engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-engine

    steps:
      - uses: actions/checkout@v4

      # actions/setup-python tries to write into /Users/runner/hostedtoolcache
      # which the self-hosted runner can't create (Permission denied). Use the
      # host's python3 + an isolated venv. Works identically on hosted runners
      # since they always have python3 in the base image.
      - name: Bootstrap Python venv
        run: |
          python3 --version
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip

      - name: Install deps
        run: .venv/bin/pip install -r requirements.txt || true

      - name: Lint (ruff)
        # Lint failures must fail the job — Daniel review.
        run: .venv/bin/pip install ruff && .venv/bin/ruff check src/

      - name: Type check (mypy)
        # mypy is still in warm-up — keep `|| true` until the codebase is annotated.
        run: .venv/bin/pip install mypy && .venv/bin/mypy src/ --ignore-missing-imports || true

      - name: Test
        # Test failures must fail the job — Daniel review.
        run: .venv/bin/pip install pytest httpx && .venv/bin/pytest tests/ -v --tb=short

  # ── Go Voice Service ────────────────────────────────────────────────────
  go:
    name: Go — voice
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/voice

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./... || true

      - name: Test
        run: go test ./... -v || true

      - name: Vet
        run: go vet ./... || true
