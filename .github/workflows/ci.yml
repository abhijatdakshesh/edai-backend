name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Node.js / NestJS services ──────────────────────────────────────────
  node:
    name: Node — ${{ matrix.service }}
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'self-hosted' }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity
          - attendance
          - academics
          - assignments
          - communications
          - finance
          - behavior
          - chatbot
          - analytics

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json   # root workspace lock file

      - name: Install deps (root workspace)
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint || true
        working-directory: services/${{ matrix.service }}

      - name: Type-check + Build
        run: ../../node_modules/.bin/tsc -p tsconfig.json --noEmit || npm run build || true
        working-directory: services/${{ matrix.service }}

      - name: Test
        run: ../../node_modules/.bin/jest --passWithNoTests --forceExit
        working-directory: services/${{ matrix.service }}

      - name: Audit
        run: npm audit --production --audit-level=high || true

  # ── Python AI Engine ────────────────────────────────────────────────────
  python:
    name: Python — ai-engine
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'self-hosted' }}
    defaults:
      run:
        working-directory: services/ai-engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt || true

      - name: Lint (ruff)
        run: pip install ruff && ruff check src/ || true

      - name: Type check (mypy)
        run: pip install mypy && mypy src/ --ignore-missing-imports || true

      - name: Test
        run: pip install pytest httpx && pytest tests/ -v --tb=short || true

  # ── Go Voice Service ────────────────────────────────────────────────────
  go:
    name: Go — voice
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'self-hosted' }}
    defaults:
      run:
        working-directory: services/voice

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./... || true

      - name: Test
        run: go test ./... -v || true

      - name: Vet
        run: go vet ./... || true
