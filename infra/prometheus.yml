global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # RV Trust services
  - job_name: 'identity'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3001']

  - job_name: 'attendance'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3002']

  - job_name: 'academics'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3003']

  - job_name: 'analytics'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3010']

  # EdAI new services
  - job_name: 'assignments'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3012']

  - job_name: 'chatbot'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3013']

  - job_name: 'behavior'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3014']

  - job_name: 'communications'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3015']

  - job_name: 'finance'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3016']

  # Python AI Engine
  - job_name: 'ai-engine'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8001']

  # Go Voice Service
  - job_name: 'voice'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8090']
