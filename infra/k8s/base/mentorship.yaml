apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentorship
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mentorship
  template:
    metadata:
      labels:
        app: mentorship
    spec:
      containers:
        - name: mentorship
          image: rvtrust/mentorship:latest
          envFrom:
            - secretRef:
                name: mentorship-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: mentorship
spec:
  selector:
    app: mentorship
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mentorship-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mentorship
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mentorship-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mentorship
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
