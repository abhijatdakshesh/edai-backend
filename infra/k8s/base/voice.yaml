apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voice
  template:
    metadata:
      labels:
        app: voice
    spec:
      containers:
        - name: voice
          image: rvtrust/voice:latest
          envFrom:
            - secretRef:
                name: voice-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: voice
spec:
  selector:
    app: voice
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: voice-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: voice
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voice-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voice
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
