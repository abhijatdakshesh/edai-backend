version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: edai
      POSTGRES_PASSWORD: edai_dev
      POSTGRES_DB: edai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Report Engine (FastAPI + ReportLab PDF generator) ────────────────────
  report-engine:
    build:
      context: ./services/report-engine
      dockerfile: DockerFile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  # ── Redpanda (Kafka-compatible) ──────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v23.3.1
    command: >
      redpanda start
      --overprovisioned
      --smp 1
      --memory 1G
      --reserve-memory 0M
      --node-id 0
      --kafka-addr PLAINTEXT://0.0.0.0:9092
      --advertise-kafka-addr PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "8082:8082"
      - "9644:9644"
    volumes:
      - redpandadata:/var/lib/redpanda/data

  # ── Keycloak (SSO) ───────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_dev
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: edai
      KC_DB_PASSWORD: edai_dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ── ClickHouse (Analytics) ───────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
      - ./scripts/clickhouse-migrations/001_create_edai_tables.sql:/docker-entrypoint-initdb.d/001_create_edai_tables.sql

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin_dev
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

  # ── Loki (Logging) ───────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3200:3100"

  # ── MailHog (Email testing) ──────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  redisdata:
  redpandadata:
  chdata:
  grafanadata:
